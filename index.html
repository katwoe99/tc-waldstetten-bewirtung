<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bewirtung">
<title>TC Waldstetten – Bewirtung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --linen:#F5F1E7;
    --linen-2:#ECE5D5;
    --clay:#B5502A;
    --clay-dark:#8A3A1E;
    --pine:#1E3A2C;
    --pine-2:#2C5040;
    --walnut:#5C4430;
    --ink:#26231D;
    --ink-soft:#6E675C;
    --gold:#C79A3D;
    --line:#DCD2BC;
    --white:#FFFFFF;
    --danger:#8C3B2E;
    --ok:#3E6B4C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{
    background:var(--linen);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    overscroll-behavior:none;
    user-select:none;
    -webkit-touch-callout:none;
  }
  #app{display:flex; flex-direction:column; height:100vh; height:100dvh; position:relative; z-index:1;}

  .bg-ball{
    position:fixed; z-index:0; pointer-events:none;
    bottom:-150px; right:-120px;
    color:var(--pine);
    opacity:0.05;
  }

  #rotate-overlay{
    display:none;
    position:fixed; inset:0; z-index:999;
    background:var(--pine);
    color:var(--linen);
    align-items:center; justify-content:center;
    flex-direction:column; text-align:center; padding:40px;
    font-family:'Inter', sans-serif;
  }
  #rotate-overlay .icon{font-size:44px; margin-bottom:14px;}
  #rotate-overlay .title{font-family:'Fraunces', serif; font-weight:600; font-size:24px; letter-spacing:0; margin-bottom:8px;}
  #rotate-overlay .sub{font-size:14px; color:#C9C2AE; max-width:320px;}
  @media (orientation:portrait){
    #app{display:none;}
    #rotate-overlay{display:flex;}
  }

  /* Header */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 26px 14px;
    background:var(--pine);
    color:var(--linen);
    flex-shrink:0;
    padding-top:calc(16px + env(safe-area-inset-top));
    padding-left:calc(26px + env(safe-area-inset-left));
    padding-right:calc(26px + env(safe-area-inset-right));
  }
  .stripe{height:5px; flex-shrink:0; background:linear-gradient(90deg, var(--clay) 0 34%, var(--gold) 34% 67%, var(--pine-2) 67% 100%);}
  header .brand{display:flex; align-items:baseline; gap:12px;}
  header h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:30px;
    letter-spacing:0;
    margin:0;
    line-height:1;
  }
  header .sub{
    font-size:12px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; font-weight:600;
  }
  .header-right{display:flex; align-items:center; gap:20px;}
  .clock{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px; font-weight:600; color:var(--linen);
    text-align:right; white-space:nowrap;
    letter-spacing:.3px;
  }
  nav.tabs{display:flex; gap:8px;}
  nav.tabs button{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    padding:12px 20px;
    border-radius:3px;
    border:1px solid rgba(245,241,231,0.25);
    background:transparent;
    color:#D8D2C0;
    cursor:pointer;
    position:relative;
  }
  nav.tabs button.active{
    background:var(--linen);
    color:var(--pine);
    border-color:var(--linen);
  }
  nav.tabs button .dot{
    position:absolute; top:6px; right:8px;
    width:8px; height:8px; border-radius:50%;
    background:var(--clay);
  }

  main{flex:1; overflow:hidden; display:flex;}

  /* ---------- ORDER VIEW ---------- */
  .order-view{display:flex; flex-direction:column; flex:1; overflow:hidden;}
  .order-body{display:flex; flex:1; overflow:hidden;}
  .date-bar{
    display:flex; align-items:center; gap:14px; flex-shrink:0;
    padding:10px 22px; border-bottom:1px solid var(--line); background:var(--white);
  }
  .date-bar.past{background:#FBF1E3; border-bottom-color:#E8D3A8;}
  .date-bar label{font-size:13px; font-weight:600; color:var(--ink-soft);}
  .date-bar input[type="date"]{
    font-family:'Inter', sans-serif; font-size:14px; padding:7px 10px;
    border:1px solid var(--line); border-radius:3px; background:var(--white); color:var(--ink);
  }
  .date-bar .past-note{font-size:13px; color:var(--clay-dark); font-weight:600; flex:1;}
  .date-bar .today-btn{
    padding:7px 14px; border:1px solid var(--clay); border-radius:3px; background:none;
    color:var(--clay-dark); font-weight:600; font-size:13px; cursor:pointer;
  }
  .members-rail{
    width:250px; flex-shrink:0;
    border-right:1px solid var(--line);
    background:var(--white);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:14px 10px;
  }
  .rail-label{
    font-size:11px; text-transform:uppercase; letter-spacing:1.2px;
    color:var(--ink-soft); font-weight:600; padding:0 6px 10px;
  }
  .member-search{padding:0 6px 12px;}
  .member-search input{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:3px;
    font-size:14px; font-family:inherit;
  }
  .rail-hint{color:var(--ink-soft); font-size:11px; padding:0 6px 8px; letter-spacing:.3px;}
  .member-chip{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 14px;
    min-height:52px;
    border-radius:4px;
    margin-bottom:8px;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--linen);
  }
  .member-chip.selected{
    background:var(--pine);
    border-color:var(--pine);
    color:var(--white);
  }
  .member-chip .name{font-weight:600; font-size:16px;}
  .member-chip .badge{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px; font-weight:600;
    background:var(--gold);
    color:var(--white);
    padding:3px 8px;
    border-radius:3px;
  }
  .member-chip.selected .badge{background:var(--clay);}
  .empty-note{color:var(--ink-soft); font-size:13px; padding:10px 6px; line-height:1.5;}

  .products-area{flex:1; overflow-y:auto; padding:22px; -webkit-overflow-scrolling:touch;}
  .products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px,1fr));
    gap:16px;
  }
  .product-tile{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:4px;
    padding:24px 18px;
    min-height:88px;
    cursor:pointer;
    text-align:left;
    transition:transform .06s ease;
  }
  .product-tile:active{transform:scale(0.96); background:var(--linen-2);}
  .product-tile .pname{font-weight:600; font-size:18px; margin-bottom:8px;}
  .product-tile .pprice{
    font-family:'IBM Plex Mono', monospace;
    font-size:15px; color:var(--clay-dark); font-weight:600;
  }
  .no-member-msg{
    display:flex; align-items:center; justify-content:center;
    height:100%; color:var(--ink-soft); font-size:16px; text-align:center; padding:40px;
  }

  .tab-panel{
    width:330px; flex-shrink:0;
    border-left:1px solid var(--line);
    background:var(--white);
    display:flex; flex-direction:column;
  }
  .tab-panel .th{
    padding:16px 18px 10px;
    border-bottom:1px solid var(--line);
  }
  .tab-panel .th .who{font-family:'Fraunces', serif; font-weight:600; font-size:21px; letter-spacing:0; color:var(--pine);}
  .tab-panel .th .since{font-size:12px; color:var(--ink-soft);}
  .tab-lines{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 14px;}
  .tab-line{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; border-bottom:1px dashed var(--line);
  }
  .tab-line .li-name{font-size:14px; font-weight:500;}
  .tab-line .li-sub{font-size:11px; color:var(--ink-soft);}
  .stepper{display:flex; align-items:center; gap:10px;}
  .stepper button{
    width:38px; height:38px; border-radius:3px; border:1px solid var(--line);
    background:var(--linen); font-size:18px; font-weight:700; cursor:pointer; color:var(--ink);
  }
  .stepper button:active{background:var(--linen-2);}
  .stepper .qty{font-family:'IBM Plex Mono', monospace; font-weight:600; min-width:20px; text-align:center; font-size:15px;}
  .tab-footer{padding:18px; border-top:2px solid var(--pine);}
  .tab-total{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:14px;
  }
  .tab-total .lbl{font-size:13px; color:var(--ink-soft); font-weight:600; text-transform:uppercase; letter-spacing:.5px;}
  .tab-total .amt{font-family:'IBM Plex Mono', monospace; font-size:28px; font-weight:600; color:var(--pine);}
  .pay-btn{
    width:100%; padding:18px; border:none; border-radius:3px;
    background:var(--clay); color:var(--white); font-weight:700; font-size:16px;
    cursor:pointer;
  }
  .pay-btn.confirming{
    background:var(--danger);
  }
  .pay-btn:disabled{background:#CFC7B4; cursor:default;}
  .tab-empty{color:var(--ink-soft); font-size:13px; text-align:center; padding:30px 10px;}

  /* ---------- VERWALTUNG ---------- */
  .admin-view{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:26px 34px;}
  .admin-grid{display:grid; grid-template-columns:1fr 1fr; gap:28px; max-width:1000px;}
  .admin-card{background:var(--white); border:1px solid var(--line); border-radius:6px; padding:20px;}
  .admin-card h2{
    font-family:'Fraunces', serif; font-weight:600; font-size:20px; letter-spacing:0; color:var(--pine); margin:0 0 14px;
  }
  .row-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; border-bottom:1px solid var(--linen-2);
  }
  .row-item .ri-name{font-weight:500;}
  .row-item .ri-price{font-family:'IBM Plex Mono', monospace; color:var(--ink-soft); font-size:13px;}
  .row-item .ri-actions button{
    border:none; background:none; cursor:pointer; color:var(--ink-soft); font-size:13px; margin-left:10px;
  }
  .row-item .ri-actions button.del{color:var(--danger);}
  .add-form{display:flex; gap:8px; margin-top:14px;}
  .add-form input{
    flex:1; padding:11px 12px; border:1px solid var(--line); border-radius:3px; font-size:15px; font-family:inherit;
  }
  .add-form input.price{max-width:90px;}
  .add-form button{
    padding:11px 18px; border:none; border-radius:3px; background:var(--pine); color:var(--white);
    font-weight:600; cursor:pointer; font-size:14px;
  }

  /* ---------- VERLAUF (KALENDER) ---------- */
  .history-view{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:26px 34px;}
  .cal-head{display:flex; align-items:center; gap:16px; margin-bottom:18px;}
  .cal-head .cal-month{font-family:'Fraunces', serif; font-weight:600; font-size:23px; letter-spacing:0; color:var(--pine); min-width:220px;}
  .cal-nav-btn{
    width:40px; height:40px; border-radius:3px; border:1px solid var(--line); background:var(--white);
    font-size:18px; cursor:pointer; color:var(--pine); font-weight:700;
  }
  .cal-grid{max-width:720px;}
  .cal-weekdays{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px;}
  .cal-weekdays div{
    text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--ink-soft); font-weight:600;
  }
  .cal-week{display:grid; grid-template-columns:repeat(7,1fr); gap:8px; margin-bottom:8px;}
  .cal-cell{
    aspect-ratio:1/0.82; border-radius:4px; border:1px solid var(--line); background:var(--white);
    padding:8px; display:flex; flex-direction:column; justify-content:space-between;
  }
  .cal-cell.empty{border:none; background:transparent;}
  .cal-cell:not(.empty){cursor:pointer;}
  .cal-cell:not(.empty):active{background:var(--linen-2);}
  .cal-cell.today{border-color:var(--pine); border-width:2px;}
  .cal-cell .cc-num{font-weight:700; font-size:14px;}
  .cal-cell .cc-amt{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-soft);}
  .cal-cell .cc-dot{width:9px; height:9px; border-radius:50%; align-self:flex-end;}
  .cc-dot.open{background:var(--danger);}
  .cc-dot.paid{background:var(--ok);}

  .back-btn{
    display:inline-flex; align-items:center; gap:6px;
    background:none; border:none; color:var(--pine); font-weight:600; font-size:15px;
    cursor:pointer; padding:8px 0; margin-bottom:14px;
  }
  .drill-head{display:flex; align-items:baseline; justify-content:space-between; max-width:680px; margin-bottom:16px; flex-wrap:wrap; gap:8px;}
  .drill-head .dh-name{font-family:'Fraunces', serif; font-weight:600; font-size:22px; color:var(--pine); letter-spacing:0;}
  .drill-head .dh-total{font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:18px; color:var(--ink-soft);}
  .day-row{
    background:var(--white); border:1px solid var(--line); border-radius:4px;
    padding:14px 18px; margin-bottom:10px; max-width:680px;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
  }
  .day-row.is-open{border-left:5px solid var(--danger);}
  .day-row.is-paid{border-left:5px solid var(--ok);}
  .day-row .dr-name{font-weight:700; font-size:15px;}
  .day-row .dr-items{font-size:12px; color:var(--ink-soft); margin-top:3px;}
  .day-row .dr-right{text-align:right;}
  .day-row .dr-amt{font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:16px; margin-bottom:6px;}
  .status-btn{
    display:inline-block; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
    padding:8px 14px; border-radius:3px; border:none; cursor:pointer; white-space:nowrap;
  }
  .status-btn.open{background:#F1DCD5; color:var(--danger);}
  .status-btn.paid{background:#DCE8DF; color:var(--ok);}
  .status-btn.confirming{background:var(--danger); color:var(--white);}
  .no-history{color:var(--ink-soft); text-align:center; padding:40px;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}
</style>
</head>
<body>
<div class="bg-ball" aria-hidden="true">
  <svg viewBox="0 0 200 200" width="620" height="620">
    <circle cx="100" cy="100" r="96" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M100,4 C40,30 40,170 100,196" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M100,4 C160,30 160,170 100,196" fill="none" stroke="currentColor" stroke-width="2"/>
  </svg>
</div>
<div id="app"></div>
<div id="rotate-overlay">
  <div class="icon">↻</div>
  <div class="title">Bitte iPad drehen</div>
  <div class="sub">Bewirtung läuft im Querformat am besten. Einfach das Tablet quer drehen.</div>
</div>

<script>
const STORAGE_KEY = 'club-data';
let state = null;
let ui = {
  view: 'order',
  selectedMember: null,
  memberSearch: '',
  memberSearchActive: false,
  confirmingPayId: null,
  confirmingRevertKey: null,
  bookingDate: dayKeyFromDate(new Date()),
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  drillDay: null
};
let confirmTimeout = null;
let confirmRevertTimeout = null;

function uid(){ return Math.random().toString(36).slice(2,10); }

function defaultState(){
  return {
    members: [],
    products: [
      { id: uid(), name: 'Wasser', price: 1.5 },
      { id: uid(), name: 'Spezi', price: 2.5 },
      { id: uid(), name: 'Bier', price: 3.0 },
      { id: uid(), name: 'Kaffee', price: 2.0 },
    ],
    orders: []
  };
}

function migrate(){
  // Migrate from older data shapes (openTabs/history) if present.
  if(!state.orders){
    state.orders = [];
    if(state.history && Array.isArray(state.history)){
      state.history.forEach(h=>{
        (h.items||[]).forEach(it=>{
          state.orders.push({
            id: uid(), memberId: h.memberId || null, memberName: h.memberName,
            productId: it.productId || null, productName: it.name,
            unitPrice: it.unitPrice, qty: it.qty,
            ts: h.ts, paid: true, paidTs: h.ts
          });
        });
      });
    }
    if(state.openTabs){
      Object.keys(state.openTabs).forEach(memberId=>{
        const member = (state.members||[]).find(m=>m.id===memberId);
        const tab = state.openTabs[memberId];
        Object.keys(tab).forEach(pid=>{
          const qty = tab[pid];
          if(qty<=0) return;
          const p = (state.products||[]).find(x=>x.id===pid);
          state.orders.push({
            id: uid(), memberId, memberName: member?member.name:'Unbekannt',
            productId: pid, productName: p?p.name:'Unbekannt', unitPrice: p?p.price:0, qty,
            ts: Date.now(), paid: false, paidTs: null
          });
        });
      });
    }
    delete state.history;
    delete state.openTabs;
  }
  if(!state.members) state.members = [];
  if(!state.products) state.products = [];
  if(!state.orders) state.orders = [];
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      migrate();
    } else {
      state = defaultState();
    }
    saveState();
  } catch (e) {
    console.error('Konnte gespeicherte Daten nicht lesen, starte neu.', e);
    state = defaultState();
    saveState();
  }
  render();
}

function saveState(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Speicherfehler', e);
  }
}

function fmt(n){
  return n.toFixed(2).replace('.', ',') + ' €';
}

function dayKeyFromDate(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayKeyFromTs(ts){ return dayKeyFromDate(new Date(ts)); }

function openOrdersForMember(memberId){
  return state.orders.filter(o=>o.memberId===memberId && !o.paid && o.qty>0);
}
function memberTabTotal(memberId){
  return openOrdersForMember(memberId).reduce((s,o)=> s + o.qty*o.unitPrice, 0);
}
function exportBackup(){
  try {
    const now = new Date();
    const stamp = now.toLocaleDateString('de-DE') + ' ' + now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const filename = 'bewirtung-sicherung-' + dayKeyFromDate(now) + '.json';
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 2000);
    localStorage.setItem('club-data-last-backup', stamp);
    render();
  } catch(e){
    console.error('Sicherung fehlgeschlagen', e);
    alert('Sicherung konnte nicht erstellt werden.');
  }
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.members) || !Array.isArray(parsed.products)){
        alert('Diese Datei sieht nicht wie eine gültige Sicherung aus.');
        return;
      }
      if(!confirm('Aktuelle Daten auf diesem iPad wirklich mit der Sicherungsdatei ersetzen? Das kann nicht rückgängig gemacht werden.')) return;
      state = parsed;
      migrate();
      saveState();
      ui.selectedMember = null;
      ui.drillDay = null;
      render();
      alert('Sicherung wurde eingespielt.');
    } catch(e){
      console.error('Import fehlgeschlagen', e);
      alert('Datei konnte nicht gelesen werden.');
    }
  };
  reader.readAsText(file);
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <div class="brand">
        <h1>TC Waldstetten</h1>
        <span class="sub">Bewirtung</span>
      </div>
      <div class="header-right">
        <nav class="tabs">
          <button data-view="order" class="${ui.view==='order'?'active':''}">Buchen</button>
          <button data-view="history" class="${ui.view==='history'?'active':''}">Verlauf</button>
          <button data-view="admin" class="${ui.view==='admin'?'active':''}">Verwaltung</button>
        </nav>
        <div class="clock" id="clock"></div>
      </div>
    </header>
    <div class="stripe"></div>
    <main id="main"></main>
  `;
  tickClock();

  app.querySelectorAll('nav.tabs button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(btn.dataset.view === 'history' && ui.view !== 'history') ui.drillDay = null;
      ui.confirmingPayId = null;
      ui.confirmingRevertKey = null;
      ui.memberSearchActive = false;
      clearTimeout(confirmTimeout);
      clearTimeout(confirmRevertTimeout);
      ui.view = btn.dataset.view;
      render();
    });
  });

  const main = document.getElementById('main');
  try {
    if(ui.view === 'order') main.appendChild(renderOrderView());
    else if(ui.view === 'admin') main.appendChild(renderAdminView());
    else main.appendChild(renderHistoryView());
  } catch(e){
    console.error('Anzeigefehler', e);
    main.innerHTML = `<div class="no-history" style="padding:60px;">
      Da ist etwas schiefgelaufen beim Anzeigen.<br>
      Die gespeicherten Daten sind davon nicht betroffen.<br><br>
      <button onclick="ui.view='order'; ui.selectedMember=null; ui.drillDay=null; render();"
        style="padding:12px 20px; border:none; border-radius:3px; background:var(--pine); color:var(--white); font-weight:600; cursor:pointer;">
        Zu „Buchen" zurück
      </button>
    </div>`;
  }
}

/* ============ BUCHEN ============ */

function renderOrderView(){
  const wrap = document.createElement('div');
  wrap.className = 'order-view';

  const todayKey = dayKeyFromDate(new Date());
  const isPast = ui.bookingDate !== todayKey;
  const dateBar = document.createElement('div');
  dateBar.className = 'date-bar' + (isPast ? ' past' : '');
  dateBar.innerHTML = `
    <label for="booking-date-input">Buchen für:</label>
    <input type="date" id="booking-date-input" value="${ui.bookingDate}" max="${todayKey}">
    ${isPast ? `<span class="past-note">Achtung: Buchungen gehen auf dieses Datum, nicht auf heute.</span><button class="today-btn">Zurück auf heute</button>` : ''}
  `;
  dateBar.querySelector('#booking-date-input').addEventListener('change', (e)=>{
    ui.bookingDate = e.target.value || todayKey;
    render();
  });
  if(isPast){
    dateBar.querySelector('.today-btn').addEventListener('click', ()=>{
      ui.bookingDate = todayKey;
      render();
    });
  }
  wrap.appendChild(dateBar);

  const body = document.createElement('div');
  body.className = 'order-body';

  const rail = document.createElement('div');
  rail.className = 'members-rail';
  rail.innerHTML = `
    <div class="rail-label">Personen</div>
    <div class="member-search"><input type="text" id="member-search-input" placeholder="Name suchen…" value="${escapeHtml(ui.memberSearch)}"></div>
    <div id="member-chip-list"></div>
  `;
  const chipList = rail.querySelector('#member-chip-list');
  fillMemberChipList(chipList);
  const searchInput = rail.querySelector('#member-search-input');
  searchInput.addEventListener('input', (e)=>{
    ui.memberSearch = e.target.value;
    fillMemberChipList(chipList);
  });
  searchInput.addEventListener('focus', ()=>{
    ui.memberSearchActive = true;
    fillMemberChipList(chipList);
  });
  body.appendChild(rail);

  const productsArea = document.createElement('div');
  productsArea.className = 'products-area';
  if(!ui.selectedMember){
    productsArea.innerHTML = `<div class="no-member-msg">Erst links eine Person auswählen,<br>dann Getränke oder Snacks antippen.</div>`;
  } else {
    const grid = document.createElement('div');
    grid.className = 'products-grid';
    state.products.forEach(p=>{
      const tile = document.createElement('div');
      tile.className = 'product-tile';
      tile.innerHTML = `<div class="pname">${escapeHtml(p.name)}</div><div class="pprice">${fmt(p.price)}</div>`;
      tile.addEventListener('click', ()=>{ addToTab(ui.selectedMember, p.id, 1); });
      grid.appendChild(tile);
    });
    productsArea.appendChild(grid);
  }
  body.appendChild(productsArea);
  body.appendChild(renderTabPanel());
  wrap.appendChild(body);
  return wrap;
}

function fillMemberChipList(container){
  const query = ui.memberSearch.trim().toLowerCase();
  const showAll = ui.memberSearchActive || query;

  if(state.members.length === 0){
    container.innerHTML = `<div class="empty-note">Noch niemand angelegt. Unter "Verwaltung" Personen hinzufügen.</div>`;
    return;
  }

  let list;
  if(query){
    list = state.members.filter(m => m.name.toLowerCase().includes(query));
  } else if(showAll){
    list = state.members.slice();
  } else {
    list = state.members.filter(m => memberTabTotal(m.id) > 0);
  }
  list = list.slice().sort((a,b)=> a.name.localeCompare(b.name, 'de'));

  container.innerHTML = '';

  if(!showAll){
    const hint = document.createElement('div');
    hint.className = 'rail-hint';
    hint.textContent = 'Zeigt Personen mit offener Buchung. Zum Suchbeginn antippen für alle Namen.';
    container.appendChild(hint);
  }

  if(list.length === 0){
    const note = document.createElement('div');
    note.className = 'empty-note';
    note.textContent = query
      ? 'Keine Treffer für „' + ui.memberSearch + '".'
      : 'Aktuell hat niemand eine offene Buchung.';
    container.appendChild(note);
    return;
  }

  list.forEach(m=>{
    const total = memberTabTotal(m.id);
    const chip = document.createElement('div');
    chip.className = 'member-chip' + (ui.selectedMember===m.id ? ' selected' : '');
    chip.innerHTML = `<span class="name">${escapeHtml(m.name)}</span>` + (total>0 ? `<span class="badge">${fmt(total)}</span>` : '');
    chip.addEventListener('click', ()=>{
      ui.selectedMember = m.id;
      ui.memberSearch = '';
      ui.memberSearchActive = false;
      ui.confirmingPayId = null;
      clearTimeout(confirmTimeout);
      render();
    });
    container.appendChild(chip);
  });
}

function renderTabPanel(){
  const panel = document.createElement('div');
  panel.className = 'tab-panel';
  if(!ui.selectedMember){
    panel.innerHTML = `<div class="tab-empty" style="margin-top:40px;">Kein Konto ausgewählt.</div>`;
    return panel;
  }
  const member = state.members.find(m=>m.id===ui.selectedMember);
  const orders = openOrdersForMember(ui.selectedMember).slice().sort((a,b)=> a.ts - b.ts);
  const todayKey = dayKeyFromDate(new Date());

  panel.innerHTML = `
    <div class="th">
      <div class="who">${member ? escapeHtml(member.name) : ''}</div>
      <div class="since">Offene Bestellungen</div>
    </div>
  `;

  const lines = document.createElement('div');
  lines.className = 'tab-lines';
  if(orders.length === 0){
    lines.innerHTML = `<div class="tab-empty">Noch nichts gebucht.</div>`;
  } else {
    orders.forEach(o=>{
      const orderDayKey = dayKeyFromTs(o.ts);
      const dateNote = orderDayKey !== todayKey
        ? ' · ' + new Date(o.ts).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' })
        : '';
      const line = document.createElement('div');
      line.className = 'tab-line';
      line.innerHTML = `
        <div>
          <div class="li-name">${escapeHtml(o.productName)}</div>
          <div class="li-sub">${fmt(o.unitPrice)} · ${fmt(o.unitPrice*o.qty)}${dateNote}</div>
        </div>
        <div class="stepper">
          <button data-act="minus">−</button>
          <span class="qty">${o.qty}</span>
          <button data-act="plus">+</button>
        </div>
      `;
      line.querySelector('[data-act="minus"]').addEventListener('click', ()=> adjustOrderQty(o.id, -1));
      line.querySelector('[data-act="plus"]').addEventListener('click', ()=> adjustOrderQty(o.id, 1));
      lines.appendChild(line);
    });
  }
  panel.appendChild(lines);

  const total = memberTabTotal(ui.selectedMember);
  const isConfirming = ui.confirmingPayId === ui.selectedMember;
  const footer = document.createElement('div');
  footer.className = 'tab-footer';
  footer.innerHTML = `
    <div class="tab-total"><span class="lbl">Summe</span><span class="amt">${fmt(total)}</span></div>
    <button class="pay-btn ${isConfirming?'confirming':''}" ${total<=0?'disabled':''}>
      ${isConfirming ? 'Wirklich bezahlt? Nochmal tippen' : 'Als bezahlt markieren'}
    </button>
  `;
  footer.querySelector('.pay-btn').addEventListener('click', ()=> requestSettle(ui.selectedMember));
  panel.appendChild(footer);

  return panel;
}

function tsForDayKey(dayKey){
  const [y,m,d] = dayKey.split('-').map(Number);
  const now = new Date();
  return new Date(y, m-1, d, now.getHours(), now.getMinutes(), now.getSeconds()).getTime();
}

function addToTab(memberId, productId, delta){
  const member = state.members.find(m=>m.id===memberId);
  const product = state.products.find(p=>p.id===productId);
  if(!member || !product) return;
  const targetDayKey = ui.bookingDate || dayKeyFromDate(new Date());
  let entry = state.orders.find(o=>o.memberId===memberId && o.productId===productId && !o.paid && dayKeyFromTs(o.ts) === targetDayKey);
  if(!entry){
    if(delta<=0) return;
    entry = { id: uid(), memberId, memberName: member.name, productId, productName: product.name, unitPrice: product.price, qty:0, ts: tsForDayKey(targetDayKey), paid:false, paidTs:null };
    state.orders.push(entry);
  }
  entry.qty = Math.max(0, entry.qty + delta);
  entry.memberName = member.name;
  entry.productName = product.name;
  entry.unitPrice = product.price;
  if(entry.qty === 0){
    state.orders = state.orders.filter(o=>o!==entry);
  }
  saveState();
  render();
}

function adjustOrderQty(orderId, delta){
  const entry = state.orders.find(o=>o.id===orderId);
  if(!entry) return;
  entry.qty = Math.max(0, entry.qty + delta);
  if(entry.qty === 0){
    state.orders = state.orders.filter(o=>o!==entry);
  }
  saveState();
  render();
}

function requestSettle(memberId){
  if(ui.confirmingPayId === memberId){
    clearTimeout(confirmTimeout);
    ui.confirmingPayId = null;
    settleTab(memberId);
  } else {
    ui.confirmingPayId = memberId;
    clearTimeout(confirmTimeout);
    confirmTimeout = setTimeout(()=>{
      ui.confirmingPayId = null;
      render();
    }, 4000);
    render();
  }
}

function settleTab(memberId){
  const orders = openOrdersForMember(memberId);
  if(orders.length === 0) return;
  const now = Date.now();
  orders.forEach(o=>{ o.paid = true; o.paidTs = now; });
  saveState();
  render();
}

function requestRevert(rowKey, items){
  if(ui.confirmingRevertKey === rowKey){
    clearTimeout(confirmRevertTimeout);
    ui.confirmingRevertKey = null;
    items.forEach(o=>{ o.paid = false; o.paidTs = null; });
    saveState();
    render();
  } else {
    ui.confirmingRevertKey = rowKey;
    clearTimeout(confirmRevertTimeout);
    confirmRevertTimeout = setTimeout(()=>{
      ui.confirmingRevertKey = null;
      render();
    }, 4000);
    render();
  }
}

/* ============ VERWALTUNG ============ */

function renderAdminView(){
  const wrap = document.createElement('div');
  wrap.className = 'admin-view';
  const grid = document.createElement('div');
  grid.className = 'admin-grid';

  const prodCard = document.createElement('div');
  prodCard.className = 'admin-card';
  prodCard.innerHTML = `<h2>Getränke &amp; Preise</h2>`;
  state.products.forEach(p=>{
    const row = document.createElement('div');
    row.className = 'row-item';
    row.innerHTML = `
      <span class="ri-name">${escapeHtml(p.name)}</span>
      <span class="ri-price">${fmt(p.price)}</span>
      <span class="ri-actions">
        <button data-act="edit">Preis ändern</button>
        <button data-act="del" class="del">Löschen</button>
      </span>
    `;
    row.querySelector('[data-act="edit"]').addEventListener('click', ()=>{
      const val = prompt('Neuer Preis für ' + p.name + ' (in Euro):', p.price.toFixed(2));
      if(val === null) return;
      const num = parseFloat(val.replace(',', '.'));
      if(!isNaN(num) && num >= 0){ p.price = num; saveState(); render(); }
    });
    row.querySelector('[data-act="del"]').addEventListener('click', ()=>{
      if(confirm('„' + p.name + '" wirklich löschen?')){
        state.products = state.products.filter(x=>x.id!==p.id);
        saveState(); render();
      }
    });
    prodCard.appendChild(row);
  });
  const prodForm = document.createElement('div');
  prodForm.className = 'add-form';
  prodForm.innerHTML = `
    <input type="text" placeholder="Name (z. B. Radler)" id="new-prod-name">
    <input type="text" placeholder="Preis" class="price" id="new-prod-price">
    <button>Hinzufügen</button>
  `;
  prodForm.querySelector('button').addEventListener('click', ()=>{
    const nameEl = prodForm.querySelector('#new-prod-name');
    const priceEl = prodForm.querySelector('#new-prod-price');
    const name = nameEl.value.trim();
    const price = parseFloat(priceEl.value.replace(',', '.'));
    if(!name || isNaN(price) || price < 0) return;
    state.products.push({ id: uid(), name, price });
    saveState(); render();
  });
  prodCard.appendChild(prodForm);
  grid.appendChild(prodCard);

  const memCard = document.createElement('div');
  memCard.className = 'admin-card';
  memCard.innerHTML = `<h2>Personen</h2>`;
  state.members.forEach(m=>{
    const owed = memberTabTotal(m.id);
    const row = document.createElement('div');
    row.className = 'row-item';
    row.innerHTML = `
      <span class="ri-name">${escapeHtml(m.name)}</span>
      <span class="ri-price">${owed>0 ? 'offen: ' + fmt(owed) : ''}</span>
      <span class="ri-actions">
        <button data-act="del" class="del">Löschen</button>
      </span>
    `;
    row.querySelector('[data-act="del"]').addEventListener('click', ()=>{
      const warn = owed>0 ? ' Achtung: es gibt noch eine offene, unbezahlte Buchung über ' + fmt(owed) + '.' : '';
      if(confirm('„' + m.name + '" wirklich löschen?' + warn)){
        state.members = state.members.filter(x=>x.id!==m.id);
        if(ui.selectedMember === m.id) ui.selectedMember = null;
        saveState(); render();
      }
    });
    memCard.appendChild(row);
  });
  const memForm = document.createElement('div');
  memForm.className = 'add-form';
  memForm.innerHTML = `
    <input type="text" placeholder="Name" id="new-member-name">
    <button>Hinzufügen</button>
  `;
  memForm.querySelector('button').addEventListener('click', ()=>{
    const nameEl = memForm.querySelector('#new-member-name');
    const name = nameEl.value.trim();
    if(!name) return;
    state.members.push({ id: uid(), name });
    saveState(); render();
  });
  memCard.appendChild(memForm);
  grid.appendChild(memCard);

  const backupCard = document.createElement('div');
  backupCard.className = 'admin-card';
  const lastBackup = localStorage.getItem('club-data-last-backup');
  backupCard.innerHTML = `
    <h2>Datensicherung</h2>
    <p style="font-size:13px; color:var(--ink-soft); line-height:1.6; margin:0 0 14px;">
      Alle Daten liegen nur auf diesem iPad. Als zusätzliche Absicherung könnt ihr euch
      regelmäßig (z. B. einmal pro Woche) eine Sicherungsdatei speichern lassen.
    </p>
    ${lastBackup ? `<p style="font-size:12px; color:var(--ink-soft); margin:0 0 12px;">Letzte Sicherung: ${escapeHtml(lastBackup)}</p>` : ''}
    <div class="add-form">
      <button id="export-backup-btn">Sicherung speichern</button>
      <button id="import-backup-btn" style="background:var(--walnut);">Sicherung einspielen</button>
    </div>
    <input type="file" id="import-file-input" accept="application/json" style="display:none;">
  `;
  backupCard.querySelector('#export-backup-btn').addEventListener('click', exportBackup);
  backupCard.querySelector('#import-backup-btn').addEventListener('click', ()=>{
    backupCard.querySelector('#import-file-input').click();
  });
  backupCard.querySelector('#import-file-input').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(file) importBackup(file);
    e.target.value = '';
  });
  grid.appendChild(backupCard);

  wrap.appendChild(grid);
  return wrap;
}

/* ============ VERLAUF (KALENDER) ============ */

function computeDayMap(){
  const map = {};
  state.orders.forEach(o=>{
    if(o.qty<=0) return;
    const key = dayKeyFromTs(o.ts);
    if(!map[key]) map[key] = { total:0, hasOpen:false, hasPaid:false };
    map[key].total += o.qty*o.unitPrice;
    if(o.paid) map[key].hasPaid = true; else map[key].hasOpen = true;
  });
  return map;
}

function buildMonthGrid(year, month){
  const firstOfMonth = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const leading = (firstOfMonth.getDay()+6)%7; // Monday-first
  const cells = [];
  for(let i=0;i<leading;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(new Date(year, month, d));
  while(cells.length % 7 !== 0) cells.push(null);
  const weeks = [];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  return weeks;
}

function renderHistoryView(){
  const wrap = document.createElement('div');
  wrap.className = 'history-view';

  if(ui.drillDay){
    return renderDayDrilldown(wrap);
  }

  const dayMap = computeDayMap();
  const todayKey = dayKeyFromDate(new Date());

  const head = document.createElement('div');
  head.className = 'cal-head';
  const monthLabel = new Date(ui.calYear, ui.calMonth, 1).toLocaleDateString('de-DE', { month:'long', year:'numeric' });
  head.innerHTML = `
    <button class="cal-nav-btn" id="cal-prev">‹</button>
    <div class="cal-month">${monthLabel}</div>
    <button class="cal-nav-btn" id="cal-next">›</button>
  `;
  head.querySelector('#cal-prev').addEventListener('click', ()=>{
    ui.calMonth -= 1;
    if(ui.calMonth < 0){ ui.calMonth = 11; ui.calYear -= 1; }
    render();
  });
  head.querySelector('#cal-next').addEventListener('click', ()=>{
    ui.calMonth += 1;
    if(ui.calMonth > 11){ ui.calMonth = 0; ui.calYear += 1; }
    render();
  });
  wrap.appendChild(head);

  const calGrid = document.createElement('div');
  calGrid.className = 'cal-grid';
  calGrid.innerHTML = `
    <div class="cal-weekdays">
      <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
    </div>
  `;
  const weeks = buildMonthGrid(ui.calYear, ui.calMonth);
  weeks.forEach(week=>{
    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week';
    week.forEach(date=>{
      const cell = document.createElement('div');
      if(!date){
        cell.className = 'cal-cell empty';
        weekEl.appendChild(cell);
        return;
      }
      const key = dayKeyFromDate(date);
      const info = dayMap[key];
      cell.className = 'cal-cell' + (key===todayKey ? ' today' : '');
      let dotHtml = '';
      if(info) dotHtml = `<span class="cc-dot ${info.hasOpen ? 'open' : 'paid'}"></span>`;
      cell.innerHTML = `
        <span class="cc-num">${date.getDate()}</span>
        ${info ? `<span class="cc-amt">${fmt(info.total)}</span>` : ''}
        ${dotHtml}
      `;
      cell.addEventListener('click', ()=>{ ui.drillDay = key; render(); });
      weekEl.appendChild(cell);
    });
    calGrid.appendChild(weekEl);
  });
  wrap.appendChild(calGrid);

  return wrap;
}

function renderDayDrilldown(wrap){
  const key = ui.drillDay;
  const dayOrders = state.orders.filter(o => o.qty>0 && dayKeyFromTs(o.ts) === key);

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.textContent = '← Zurück zum Kalender';
  back.addEventListener('click', ()=>{ ui.drillDay = null; render(); });
  wrap.appendChild(back);

  const dateLabel = new Date(key + 'T00:00:00').toLocaleDateString('de-DE', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  const total = dayOrders.reduce((s,o)=> s+o.qty*o.unitPrice, 0);
  const head = document.createElement('div');
  head.className = 'drill-head';
  head.innerHTML = `<span class="dh-name">${escapeHtml(dateLabel)}</span><span class="dh-total">Tagesumsatz: ${fmt(total)}</span>`;
  wrap.appendChild(head);

  if(dayOrders.length > 0){
    const hint = document.createElement('div');
    hint.className = 'rail-hint';
    hint.style.marginBottom = '10px';
    hint.textContent = '„Bezahlt" antippen setzt zurück auf „offen" (zweimal tippen zum Bestätigen). „Offen" antippen springt zu Buchen.';
    wrap.appendChild(hint);
  }

  if(dayOrders.length === 0){
    const empty = document.createElement('div');
    empty.className = 'no-history';
    empty.textContent = 'Keine Buchungen an diesem Tag.';
    wrap.appendChild(empty);
    return wrap;
  }

  const byMember = {};
  dayOrders.forEach(o=>{
    const groupKey = o.memberId || ('name:' + (o.memberName || 'Unbekannt'));
    if(!byMember[groupKey]) byMember[groupKey] = { memberId: o.memberId || null, name: o.memberName || 'Unbekannt', items:[], total:0, allPaid:true };
    byMember[groupKey].items.push(o);
    byMember[groupKey].total += o.qty*o.unitPrice;
    if(!o.paid) byMember[groupKey].allPaid = false;
  });

  Object.keys(byMember).sort((a,b)=> byMember[a].name.localeCompare(byMember[b].name,'de')).forEach(groupKey=>{
    const d = byMember[groupKey];
    const rowKey = key + '|' + groupKey;
    const armed = ui.confirmingRevertKey === rowKey;
    const row = document.createElement('div');
    row.className = 'day-row ' + (d.allPaid ? 'is-paid' : 'is-open');
    const itemsStr = d.items.map(o=> o.qty + '× ' + escapeHtml(o.productName)).join(', ');
    row.innerHTML = `
      <div>
        <div class="dr-name">${escapeHtml(d.name)}</div>
        <div class="dr-items">${itemsStr}</div>
      </div>
      <div class="dr-right">
        <div class="dr-amt">${fmt(d.total)}</div>
        <button class="status-btn ${d.allPaid ? 'paid' : 'open'} ${armed?'confirming':''}">
          ${d.allPaid ? (armed ? 'Wirklich? Nochmal tippen' : 'Bezahlt') : 'Offen'}
        </button>
      </div>
    `;
    row.querySelector('.status-btn').addEventListener('click', (e)=>{
      e.stopPropagation();
      if(d.allPaid){
        requestRevert(rowKey, d.items);
      } else if(d.memberId){
        ui.view = 'order';
        ui.selectedMember = d.memberId;
        ui.drillDay = null;
        render();
      }
    });
    wrap.appendChild(row);
  });

  return wrap;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatClock(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
  const timeStr = now.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
  return dateStr + ' · ' + timeStr + ' Uhr';
}
function tickClock(){
  const el = document.getElementById('clock');
  if(el) el.textContent = formatClock();
}

loadState();
setInterval(tickClock, 15000);
</script>
